name: github_dashboard
description: A beautiful GitHub dashboard with real-time statistics

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 网络请求
  http: ^1.1.0
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 图表
  fl_chart: ^0.66.0
  
  # 图标
  cupertino_icons: ^1.0.6
  
  # URL 启动
  url_launcher: ^6.2.1
  
  # 日期格式化
  intl: ^0.19.0
  
  # 缓存图片
  cached_network_image: ^3.3.0
  
  # 骨架屏加载
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
